name: QA Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium

    - name: Check Server Availability
      id: check_server
      continue-on-error: true
      run: |
        curl -s --connect-timeout 5 http://localhost:5000 || echo "server_down=true" >> $GITHUB_OUTPUT

    - name: Run Pytest (API & E2E)
      if: steps.check_server.outputs.server_down != 'true'
      env:
        ADMIN_USER: ${{ secrets.ADMIN_USER }}
        ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        APP_URL: http://localhost:5000
      run: |
        pytest tests/ -v --alluredir=allure-results

    - name: Notify if Server Down
      if: steps.check_server.outputs.server_down == 'true'
      run: |
        echo "::warning title=Server Offline::The tests were skipped because the Parkly server (localhost:5000) is not reachable in the CI environment."

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results/
        retention-days: 7